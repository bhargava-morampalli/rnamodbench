name: Repository linting
on:
  push:
    branches:
      - dev
  pull_request:
  release:
    types: [published]

jobs:
  editorconfig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install editorconfig-checker
        run: npm install -g editorconfig-checker

      - name: Run EditorConfig check
        run: editorconfig-checker -exclude README.md $(find .* -type f | grep -v '.git\|.py\|.md\|json\|yml\|yaml\|html\|css\|work\|.nf-test\|.nextflow')

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install -g prettier

      - name: Run Prettier --check
        run: prettier --check ${GITHUB_WORKSPACE}

  pipeline-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      - name: Parse Nextflow configuration
        run: nextflow config -flat > /tmp/nextflow.config.flat

      - name: Validate JSON schemas
        run: |
          python -m json.tool nextflow_schema.json > /dev/null
          python -m json.tool assets/schema_input.json > /dev/null
          python -m json.tool assets/schema_references.json > /dev/null

  branding-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for legacy branding tokens
        run: |
          pattern='n[f]-c[o]re|n[f]c[o]re|n[f]-c[o]\.re|rna(modifications)'
          set +e
          git grep -niE "$pattern"
          status=$?
          set -e
          if [[ $status -eq 0 ]]; then
            echo "Legacy branding tokens were found in tracked files."
            exit 1
          fi
          if [[ $status -gt 1 ]]; then
            exit $status
          fi
