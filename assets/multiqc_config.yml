# Project information
title: "nf-core/rnamodifications"
subtitle: null
intro_text: >
  This report has been generated by the <a href="https://github.com/nf-core/rnamodifications" target="_blank">nf-core/rnamodifications</a>
  analysis pipeline.

report_comment: >
  This report has been generated by the <a href="https://github.com/nf-core/rnamodifications/tree/dev" target="_blank">nf-core/rnamodifications</a>
  analysis pipeline. For information about how to interpret these results, please see the
  <a href="https://nf-co.re/rnamodifications/dev/docs/output" target="_blank">documentation</a>.

# Report section order
report_section_order:
  software_versions:
    order: -1000
  nf-core-rnamodifications-summary:
    order: -1001

# Nicer report section names
module_order:
  - nanoplot:
      name: "NanoPlot"
      info: "Quality metrics for Nanopore sequencing data"
  - fastqc:
      name: "FastQC"
      info: "Quality control for sequencing reads"
  - samtools:
      name: "Samtools"
      info: "Read alignment statistics"

# Custom content section order
custom_content:
  order:
    - pipeline_info

# Table columns
table_columns_visible:
  FastQC:
    percent_duplicates: False
    percent_gc: True
    avg_sequence_length: True
    percent_fails: False
    total_sequences: True

# Removed empty module sections
remove_sections:
  - fastqc_per_base_sequence_content

# Software version list
software_versions:
  - pipeline_info

# Export options
export_plots: true

# Clean up sample names
extra_fn_clean_exts:
  - ".sorted"
  - ".mapped"
  - "_R1"
  - "_R2"
