repository_type: pipeline
nf_core_version: "3.5.1"

lint:
  # Disable checks not applicable to this pipeline
  actions_awsfulltest: false
  pipeline_todos: false

  # Skip files that may differ from template
  files_unchanged:
    - assets/email_template.html
    - CODE_OF_CONDUCT.md
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/ISSUE_TEMPLATE/feature_request.yml

  files_exist:
    - CODE_OF_CONDUCT.md
    - assets/multiqc_config.yml

# Template features configured during pipeline creation
template:
  name: rnamodifications
  org: nf-core
  version: 1.0.0
  author: Bhargava Reddy Morampalli
  description: RNA modification detection pipeline for Oxford Nanopore direct RNA sequencing

  # Features to skip from standard template
  skip:
    - igenomes     # Not using iGenomes references
    - multiqc      # MultiQC not yet implemented
    - fastqc       # Using NanoPlot instead
