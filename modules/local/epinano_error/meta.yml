name: epinano_error
description: Detect RNA modifications using EpiNano-Error by comparing base-calling error rates between native and control samples
keywords:
  - rna modification
  - m6A
  - pseudouridine
  - nanopore
  - direct rna sequencing
  - error-based detection
tools:
  - epinano:
      description: Detection of RNA modifications from Oxford Nanopore direct RNA sequencing reads
      homepage: https://github.com/novoalab/EpiNano
      documentation: https://github.com/novoalab/EpiNano/blob/master/README.md
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', rrna:'16s', replicate:'rep1' ]
  - native_bam:
      type: file
      description: Sorted BAM file from native RNA sample (modified)
      pattern: "*.bam"
  - native_bai:
      type: file
      description: BAM index file for native sample
      pattern: "*.bai"
  - ivt_bam:
      type: file
      description: Sorted BAM file from IVT (control/unmodified) sample
      pattern: "*.bam"
  - ivt_bai:
      type: file
      description: BAM index file for IVT sample
      pattern: "*.bai"
  - reference:
      type: file
      description: Reference FASTA file
      pattern: "*.{fa,fasta}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', rrna:'16s', replicate:'rep1' ]
  - results:
      type: directory
      description: Directory containing EpiNano-Error results including differential error analysis
      pattern: "*_epinano_error"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@bmorampa"
