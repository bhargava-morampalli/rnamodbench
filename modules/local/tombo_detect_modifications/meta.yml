name: "tombo_detect_modifications"
description: Detect modified bases by comparing native and IVT RNA nanopore data
keywords:
  - modifications
  - methylation
  - nanopore
  - fast5
  - tombo
  - rna
tools:
  - tombo:
      description: |
        Tombo is a suite of tools primarily for the identification of modified nucleotides
        from raw nanopore sequencing data. The detect_modifications command performs
        statistical testing to identify positions where signal distributions differ between
        native and control (IVT) samples.
      homepage: https://github.com/nanoporetech/tombo
      documentation: https://nanoporetech.github.io/tombo/
      tool_dev_url: https://github.com/nanoporetech/tombo
      licence: ["mpl-2.0"]

input:
  - key:
      type: string
      description: Sample identifier/key
  - types:
      type: list
      description: List of sample types (e.g., ['native', 'ivt'])
  - fast5_dirs:
      type: list
      description: List of directories containing resquiggled FAST5 files corresponding to each sample type
      pattern: "[*/]"

output:
  - key:
      type: string
      description: Sample identifier/key
  - stats:
      type: file
      description: Tombo statistics file containing modification detection results
      pattern: "*.tombo.stats"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@bhargava-morampalli"
