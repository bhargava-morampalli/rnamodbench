name: "xpore_diffmod"
description: Detect differential RNA modifications between sample groups using xPore's statistical framework
keywords:
  - nanopore
  - rna-modifications
  - differential-modification
  - statistical-testing
  - native-vs-ivt
tools:
  - xpore:
      description: Python package for identification and quantification of differential RNA modifications from direct RNA sequencing
      homepage: https://github.com/GoekeLab/xpore
      documentation: https://xpore.readthedocs.io
      tool_dev_url: https://github.com/GoekeLab/xpore
      doi: "10.1038/s41587-021-00949-w"
      licence: ["MIT"]

input:
  - key:
      type: string
      description: Unique identifier for the comparison
  - types:
      type: list
      description: List of sample types/groups to compare (e.g., ['native', 'ivt'])
  - dataprep_dirs:
      type: directory
      description: List of xpore dataprep output directories corresponding to each sample type
      pattern: "dataprep"

output:
  - key:
      type: string
      description: Unique identifier for the comparison
  - diffmod:
      type: directory
      description: Directory containing differential modification results (diffmod.table with statistics and predictions)
      pattern: "diffmod"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@bhargava-morampalli"
