name: "nanocompore_sampcomp"
description: Compare two conditions to identify differential RNA modifications using nanocompore
keywords:
  - nanopore
  - rna-modifications
  - differential-analysis
  - statistical-testing
  - native-vs-ivt
tools:
  - nanocompore:
      description: Software suite to identify differences in ONT nanopore sequencing raw signal corresponding to RNA modifications
      homepage: https://nanocompore.rna.rocks/
      documentation: https://nanocompore.rna.rocks/
      tool_dev_url: https://github.com/tleonardi/nanocompore
      doi: "10.1038/s41592-021-01223-8"
      licence: ["GPL-3.0-only"]

input:
  - key:
      type: string
      description: Unique identifier for the comparison
  - condition1_label:
      type: string
      description: Label for condition 1 (e.g., 'native', 'wt')
  - condition2_label:
      type: string
      description: Label for condition 2 (e.g., 'ivt', 'ko')
  - condition1_files:
      type: file
      description: List of collapsed eventalign TSV files for condition 1 replicates
      pattern: "*.tsv"
  - condition2_files:
      type: file
      description: List of collapsed eventalign TSV files for condition 2 replicates
      pattern: "*.tsv"
  - fasta:
      type: file
      description: Reference genome or transcriptome FASTA file
      pattern: "*.{fa,fasta}"

output:
  - key:
      type: string
      description: Unique identifier for the comparison
  - results:
      type: directory
      description: Directory containing nanocompore results (outSampComp.db, outSampComp_results.tsv, outSampComp_stats.tsv)
      pattern: "*_sampcomp"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@bhargava-morampalli"
