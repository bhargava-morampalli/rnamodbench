name: "nanocompore_eventalign_collapse"
description: Collapse nanopolish/f5c eventalign output by kmers rather than by event for nanocompore analysis
keywords:
  - nanopore
  - rna-modifications
  - eventalign
  - data-preparation
  - kmer-collapse
tools:
  - nanocompore:
      description: Software suite to identify differences in ONT nanopore sequencing raw signal corresponding to RNA modifications
      homepage: https://nanocompore.rna.rocks/
      documentation: https://nanocompore.rna.rocks/
      tool_dev_url: https://github.com/tleonardi/nanocompore
      doi: "10.1038/s41592-021-01223-8"
      licence: ["GPL-3.0-only"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1', single_end:false ]`
  - eventalign:
      type: file
      description: Output from f5c eventalign or nanopolish eventalign containing per-read event-level signal data
      pattern: "*.txt"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1', single_end:false ]`
  - collapsed:
      type: directory
      description: Directory containing collapsed eventalign data by kmers (eventalign.index, out_eventalign_collapse.tsv, out_eventalign_collapse.idx)
      pattern: "*"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@bhargava-morampalli"
