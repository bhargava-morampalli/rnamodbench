name: "xpore_dataprep"
description: Prepare f5c eventalign output for xPore differential modification analysis
keywords:
  - nanopore
  - rna-modifications
  - eventalign
  - data-preparation
  - methylation
tools:
  - xpore:
      description: Python package for identification and quantification of differential RNA modifications from direct RNA sequencing
      homepage: https://github.com/GoekeLab/xpore
      documentation: https://xpore.readthedocs.io
      tool_dev_url: https://github.com/GoekeLab/xpore
      doi: "10.1038/s41587-021-00949-w"
      licence: ["MIT"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1', single_end:false ]`
  - eventalign:
      type: file
      description: Output from f5c eventalign or nanopolish eventalign containing per-read event-level signal data
      pattern: "*.txt"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1', single_end:false ]`
  - dataprep:
      type: directory
      description: Directory containing preprocessed xPore data files (eventalign.index, data.json, data.index, data.readcount, data.log)
      pattern: "dataprep"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@bhargava-morampalli"
