name: "tombo_resquiggle"
description: Re-annotate raw nanopore signal with genomic alignment from basecalls
keywords:
  - resquiggle
  - nanopore
  - fast5
  - tombo
  - signal
  - alignment
  - methylation
tools:
  - tombo:
      description: |
        Tombo is a suite of tools primarily for the identification of modified nucleotides
        from raw nanopore sequencing data. The resquiggle command re-annotates raw signal
        with genomic alignment from basecalls, which is required for downstream
        modification detection.
      homepage: https://github.com/nanoporetech/tombo
      documentation: https://nanoporetech.github.io/tombo/
      tool_dev_url: https://github.com/nanoporetech/tombo
      licence: ["mpl-2.0"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1', single_end:false ]`
  - fast5:
      type: directory
      description: Directory containing FAST5 files from Oxford Nanopore sequencing
      pattern: "*/"
  - reference:
      type: file
      description: Reference genome in FASTA format
      pattern: "*.{fasta,fa,fna}"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1', single_end:false ]`
  - resquiggled:
      type: directory
      description: Directory containing resquiggled FAST5 files with corrected signal-to-sequence alignment
      pattern: "*/"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@bhargava-morampalli"
